name: isbn_book_manager
description: ISBN 掃描書籍管理應用 - 支援 iOS/Mac/Android

publish_to: 'none'

version: 1.1.0+11

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # 掃描功能
  mobile_scanner: ^5.2.3
  
  # HTTP 客戶端
  http: ^1.1.0
  
  # 本地資料庫
  sqflite: ^2.3.0
  path: ^1.8.3
  
  shared_preferences: ^2.3.2
  
  # URL 啟動器
  url_launcher: ^6.3.1
  # App Store 評分請求
  in_app_review: ^2.0.9
  # 內購（解鎖無限書籍）
  in_app_purchase: ^3.2.0
  # 內嵌 WebView（iOS 使用 WKWebView）
  webview_flutter: ^4.10.0
  
  # 圖片選擇與拍照
  image_picker: ^1.1.2
  
  # 狀態管理
  provider: ^6.1.0
  
  # JSON 序列化
  json_annotation: ^4.8.1
  
  # 日期時間
  intl: ^0.20.2
  
  # UI 組件
  cupertino_icons: ^1.0.6
  flutter_localizations:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^3.0.0
  json_serializable: ^6.7.1
  build_runner: ^2.4.6
  sqflite_common_ffi: ^2.3.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  generate: true
  
  assets:
    - assets/design/logo/

flutter_launcher_icons:
  image_path: "assets/design/logo/app_icon.png"
  android: true
  ios: true
  remove_alpha_ios: true
